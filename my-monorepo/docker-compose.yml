services:
  # 1. Relational Database: PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: shield_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-web3_shield}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Document Store: MongoDB
  mongodb:
    image: mongo:6.0
    container_name: shield_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-secret123}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  # 3. High-Speed Cache & Rate-Limiter: Redis
  redis:
    image: redis:7-alpine
    container_name: shield_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 4. Graph Database: Neo4j
  neo4j:
    image: neo4j:5.12-community
    container_name: shield_neo4j
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=none
      - neo4j_data:/data
      - neo4j_logs:/logs

  # 🔥 5. Core Application Layer: FastAPI Backend
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: shield_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend:/app
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password123}@postgres:5432/${DB_NAME:-web3_shield}
      - MONGO_URL=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-secret123}@mongodb:27017
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - mongodb
      - redis
      - neo4j

# Named volumes ensure data persists locally on your drive when containers restart
volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  neo4j_data:
  neo4j_logs: