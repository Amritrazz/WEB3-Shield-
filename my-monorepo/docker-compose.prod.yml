version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: web3_shield_prod_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-web3_shield}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - shield_network

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: web3_shield_prod_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-password123}@db:5432/${DB_NAME:-web3_shield}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - shield_network

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: web3_shield_prod_frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - shield_network

volumes:
  postgres_prod_data:

networks:
  shield_network:
    driver: bridge